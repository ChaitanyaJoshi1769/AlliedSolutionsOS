version: '3.9'

services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:16-alpine
    container_name: allied-postgres
    environment:
      POSTGRES_USER: allied
      POSTGRES_PASSWORD: allied123
      POSTGRES_DB: allied_os
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U allied']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allied-network

  # Redis - Caching and sessions
  redis:
    image: redis:7-alpine
    container_name: allied-redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allied-network

  # Neo4j - Fraud detection graph
  neo4j:
    image: neo4j:5-enterprise
    container_name: allied-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
      NEO4J_dbms_security_procedures_unrestricted: algo.*,apoc.*
    ports:
      - '7687:7687'
      - '7474:7474'
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -a neo4j://localhost:7687 -u neo4j -p neo4j123 "RETURN 1"']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - allied-network

  # Elasticsearch - Search and analytics
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: allied-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.watcher.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allied-network

  # Kafka - Event streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: allied-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - '2181:2181'
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - allied-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: allied-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - '9092:9092'
      - '29092:29092'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'kafka-broker-api-versions.sh --bootstrap-server localhost:9092 | grep -q ApiVersion',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allied-network

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: allied-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - allied-network

  # Grafana - Dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: allied-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '3003:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - allied-network

  # Loki - Log aggregation
  loki:
    image: grafana/loki:latest
    container_name: allied-loki
    ports:
      - '3100:3100'
    volumes:
      - ./infrastructure/docker/loki/loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - allied-network

  # MailHog - Email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: allied-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - allied-network

  # PgAdmin - PostgreSQL management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: allied-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alliedsolutions.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '8080:80'
    depends_on:
      - postgres
    networks:
      - allied-network

  # Jaeger - Distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: allied-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ':9411'
    ports:
      - '6831:6831/udp'
      - '16686:16686'
    networks:
      - allied-network

  # Redis Commander - Redis management UI (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: allied-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - allied-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  elasticsearch_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  allied-network:
    driver: bridge
